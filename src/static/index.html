<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <nav class="main-nav">
        <button id="nav-activities" class="nav-btn active">Activities</button>
        <button id="nav-leaderboard" class="nav-btn">Leaderboard</button>
      </nav>
    </header>

    <main>
      <section id="activities-section" class="view-section active">
        <section id="activities-container">
          <h3>Available Activities</h3>
          
          <div id="search-filter-controls">
            <div class="form-group">
              <label for="search-input">Search:</label>
              <input type="text" id="search-input" placeholder="Search by name or description..." />
            </div>
            
            <div class="form-group">
              <label for="category-filter">Category:</label>
              <select id="category-filter">
                <option value="">-- All Categories --</option>
                <!-- Categories will be loaded here -->
              </select>
            </div>
            
            <div class="form-group">
              <label for="sort-select">Sort By:</label>
              <select id="sort-select">
                <option value="name">Name (A-Z)</option>
                <option value="availability">Most Available</option>
                <option value="participants">Fewest Participants</option>
              </select>
            </div>
          </div>
          
          <div id="activities-list">
            <!-- Activities will be loaded here -->
            <p>Loading activities...</p>
          </div>
        </section>

        <section id="signup-container">
          <h3>Sign Up for an Activity</h3>
          <form id="signup-form">
            <div class="form-group">
              <label for="email">Student Email:</label>
              <input type="email" id="email" required placeholder="your-email@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="activity">Select Activity:</label>
              <select id="activity" required>
                <option value="">-- Select an activity --</option>
                <!-- Activity options will be loaded here -->
              </select>
            </div>
            <button type="submit">Sign Up</button>
          </form>
          <div id="message" class="hidden"></div>
        </section>
      </section>

      <section id="leaderboard-section" class="view-section">
        <h3>Leaderboard</h3>
        <div class="form-group">
          <label for="leaderboard-activity">Select Activity:</label>
          <select id="leaderboard-activity" required>
            <option value="">-- Select an activity --</option>
            <!-- Activity options will be loaded here -->
          </select>
        </div>
        <div id="leaderboard-content">
          <!-- Leaderboard will be loaded here -->
          <p>Select an activity to view leaderboard</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
