name: Step 3

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  find_exercise:
    name: Find participant exercise issue
    if: startsWith(github.head_ref, 'participant/')
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.find.outputs.issue-number }}
      issue-url: ${{ steps.find.outputs.issue-url }}
    steps:
      - name: Find exercise issue for participant branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EXERCISE_TITLE: "Integrate MCP with Copilot"
        run: |
          branch="$HEAD_REF"
          if [ -z "$branch" ] && [[ "$ISSUE_TITLE" =~ \[(participant/[^]]+)\] ]]; then
            branch="${BASH_REMATCH[1]}"
          fi
          if [ -z "$branch" ] && [[ "$REF_NAME" == participant/* ]]; then
            branch="$REF_NAME"
          fi
          if [ -z "$branch" ]; then
            echo "Unable to determine participant branch for this event." >&2
            exit 1
          fi
          marker="[$branch]"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            echo "No open exercise issue found for $EXERCISE_TITLE $marker." >&2
            exit 1
          fi
          issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  check_step_work:
    name: Check step work
    needs: [find_exercise]
    runs-on: ubuntu-latest
    if: |
      !github.event.repository.is_template
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      # START: Check practical exercise

      - name: Get changed files
        id: changed-files
        continue-on-error: true
        uses: tj-actions/changed-files@v46.0.3

      - name: Check for changes in src folder
        id: check-src-changes
        continue-on-error: true
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          # Show the list of all changed files
          echo "All changed files: ${ALL_CHANGED_FILES}"

          # Initialize flag
          has_src_changed=false

          # Check each changed file
          for file in ${ALL_CHANGED_FILES}; do
            if [[ $file == src/* ]]; then
              has_src_changed=true
              break
            fi
          done

          # Set step message based on results
          if ! $has_src_changed; then
            echo "No changes found in src directory"
            echo "STEP_MESSAGE=Use Copilot to implement changes in the src directory" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Changes found in src directory"
          echo "STEP_MESSAGE=Great work! Changes detected in src directory" >> $GITHUB_OUTPUT

      # END: Check practical exercise

      - name: Create comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: ${{ steps.check-src-changes.outputs.STEP_MESSAGE }}
                passed: ${{ steps.check-src-changes.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1
